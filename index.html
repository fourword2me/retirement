<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jon Frazer Dashboard</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jon Frazer Dashboard">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link id="appleIcon" rel="apple-touch-icon" href="images/apple-touch-icon.png">

<style>
html, body {
    margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    display:flex; justify-content:center; align-items:center;
}
.container {
    width:95%; max-width:1000px; height:95vh;
    display:flex; flex-direction:column; justify-content:space-evenly;
    align-items:center; text-align:center;
    background:rgba(0,0,0,0.6); border-radius:20px;
    padding:20px; box-sizing:border-box;
}
h1 { font-size:2.5rem; margin:0; }

/* ================= COUNTDOWNS ================= */
.countdown { font-size:1.8rem; margin:8px 0; transition: all 0.5s ease; }
.countdown.pulse {
    animation: pulseGlow 1.2s infinite alternate;
}
@keyframes pulseGlow {
    0% { text-shadow:0 0 5px rgba(0,255,135,0.5);}
    100% { text-shadow:0 0 20px rgba(0,255,135,1);}
}

/* ================= WORKDAYS CIRCLE ================= */
.workdays-container { position:relative; width:180px; height:180px; margin:10px 0; }
.workdays-svg { transform: rotate(-90deg); }
.workdays-number {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:2.5rem; font-weight:bold; color:#00ff87; cursor:pointer;
    text-shadow:0 0 10px rgba(0,255,135,0.7);
}

/* ================= PROGRESS BAR ================= */
.progress-container { background: rgba(255,255,255,0.15); border-radius:20px; height:22px; overflow:hidden; width:100%; max-width:600px; margin-top:8px; }
.progress-bar { height:100%; width:0%; background: linear-gradient(90deg, #00c6ff, #0072ff); transition:width 1s ease; }
.progress-text { margin-top:6px; font-size:1rem; }

/* ================= VACATION IMAGES ================= */
.vacation { display:flex; justify-content:center; flex-wrap:wrap; gap:12px; margin-top:12px; }
.vacation-item { width:100px; text-align:center; }
.vacation-item img { width:100px; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; transition: transform 0.25s, box-shadow 0.25s; }
.vacation-item img:hover { transform:scale(1.08); box-shadow:0 0 15px rgba(255,255,255,0.6);}
.vacation-item .caption { font-size:0.85rem; margin-top:4px; }

/* ================= LIGHTBOX ================= */
.lightbox { display:none; position:fixed; z-index:999; padding-top:60px; left:0; top:0; width:100%; height:100%; overflow:auto; background-color: rgba(0,0,0,0.9);}
.lightbox-content { margin:auto; display:block; max-width:90%; max-height:90%; border-radius:10px; }
.lightbox-close { position:absolute; top:20px; right:30px; color:#fff; font-size:40px; font-weight:bold; cursor:pointer; }
.lightbox-close:hover { color:#bbb; }

/* ================= DOWNLOAD LINK ================= */
#downloadIcon { margin-top:10px; display:none; padding:8px 16px; border-radius:8px; background:#00ff87; color:#000; font-weight:bold; text-decoration:none; }
#downloadIcon:hover { background:#00cc6b; }
</style>
</head>
<body>

<div class="container">
    <h1>Jon Frazer's Retirement Dashboard 🚀</h1>

    <div class="countdown" id="retirementCountdown"></div>

    <div class="workdays-container">
        <svg class="workdays-svg" width="180" height="180">
            <circle cx="90" cy="90" r="80" stroke="#00000080" stroke-width="15" fill="transparent"></circle>
            <circle id="workdaysCircle" cx="90" cy="90" r="80" stroke="#00ff87" stroke-width="15" fill="transparent" stroke-dasharray="502" stroke-dashoffset="502" stroke-linecap="round"></circle>
        </svg>
        <div class="workdays-number" id="workdaysNumber"></div>
    </div>
    <div class="label">Workdays Remaining</div>

    <div class="label">Career Progress</div>
    <div class="progress-container"><div id="careerBar" class="progress-bar"></div></div>
    <div class="progress-text" id="careerText"></div>

    <div class="countdown" id="vacationCountdown"></div>
    <div class="label">Scotland Vacation: May 9–25, 2026</div>

    <div class="vacation">
        <div class="vacation-item"><img src="images/canalboat.jpg" alt="Canal Boat"><div class="caption">Canal Boat</div></div>
        <div class="vacation-item"><img src="images/kelpies.jpg" alt="The Kelpies"><div class="caption">The Kelpies</div></div>
        <div class="vacation-item"><img src="images/edinburgh_castle.jpg" alt="Edinburgh Castle"><div class="caption">Edinburgh Castle</div></div>
    </div>

    <a id="downloadIcon" download="apple-touch-icon.png">Download Home Screen Icon</a>
</div>

<div id="lightbox" class="lightbox">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" class="lightbox-content">
</div>

<script>
// ------------------- DATES -------------------
const retirementDate = new Date("May 15, 2026 00:00:00");
const careerStart = new Date("January 1, 1990 00:00:00");
const vacationStart = new Date("May 9, 2026 00:00:00");
const vacationEnd = new Date("May 25, 2026 23:59:59");

// ------------------- WORKDAYS -------------------
function getWorkdaysRemaining(start,end){let count=0,d=new Date(start);while(d<=end){const day=d.getDay();if(day!==0&&day!==6)count++;d.setDate(d.getDate()+1);}return count;}
function formatCountdown(target){const now=new Date();const dist=target-now;if(dist<=0)return"Event Started!";const days=Math.floor(dist/(1000*60*60*24));const hours=Math.floor((dist%(1000*60*60*24))/(1000*60*60));const mins=Math.floor((dist%(1000*60*60))/(1000*60));const secs=Math.floor((dist%(1000*60))/1000);return`${days}d ${hours}h ${mins}m ${secs}s`;}

// ------------------- UPDATE DASHBOARD -------------------
function updateDashboard(){
    const now = new Date();

    // Retirement countdown
    const retCountdown = document.getElementById("retirementCountdown");
    retCountdown.textContent = (retirementDate-now>0) ? formatCountdown(retirementDate)+" until Retirement (May 15, 2026)" : "YOU'RE RETIRED 🎉";
    if((retirementDate-now)/86400000<30 && (retirementDate-now)>0) retCountdown.classList.add("pulse"); else retCountdown.classList.remove("pulse");

    // Workdays
    const workdays = getWorkdaysRemaining(now,retirementDate);
    const workdaysNumber = document.getElementById("workdaysNumber");
    workdaysNumber.textContent = workdays;

    const totalWorkdays = getWorkdaysRemaining(careerStart,retirementDate);
    const circle = document.getElementById("workdaysCircle");
    const percent = workdays/totalWorkdays;
    circle.style.strokeDashoffset = 502*(1-percent); // 502 = 2πr

    // Career progress bar
    const perc = Math.min((now-careerStart)/(retirementDate-careerStart)*100,100);
    document.getElementById("careerBar").style.width = perc+"%";
    document.getElementById("careerText").textContent = perc.toFixed(2)+"% Complete";

    // Vacation countdown
    const vacCountdown = document.getElementById("vacationCountdown");
    let vacText = "";
    vacCountdown.classList.remove("pulse");
    if(now<vacationStart) { vacText=formatCountdown(vacationStart)+" until Scotland Vacation"; vacCountdown.classList.add("pulse"); }
    else if(now<=vacationEnd) vacText="Vacation Started! 🎉";
    else vacText="Vacation Over 😢";
    vacCountdown.textContent=vacText;

    // Update home screen icon
    updateAppleIcon();
}

updateDashboard();
setInterval(updateDashboard,1000);

// ------------------- LIGHTBOX -------------------
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");
const closeBtn=document.querySelector(".lightbox-close");
document.querySelectorAll(".vacation-item img").forEach(img=>{img.addEventListener("click",()=>{lightbox.style.display="block";lightboxImg.src=img.src;});});
closeBtn.onclick=()=>lightbox.style.display="none";
lightbox.onclick=e=>{if(e.target===lightbox) lightbox.style.display="none";};

// ------------------- ICON GENERATOR -------------------
function generateIconPNG(workdays){
    const canvas=document.createElement("canvas");canvas.width=180;canvas.height=180;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#203a43"; ctx.fillRect(0,0,180,180);
    ctx.beginPath(); ctx.arc(90,90,80,0,2*Math.PI); ctx.fillStyle="#00000080"; ctx.fill();
    ctx.fillStyle="#00ff87"; ctx.font="bold 60px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(workdays,90,90);
    ctx.font="bold 18px sans-serif"; ctx.fillText("Workdays",90,135);
    return canvas.toDataURL("image/png");
}

function updateAppleIcon(){
    const workdays = document.getElementById("workdaysNumber").textContent;
    const iconURL = generateIconPNG(workdays)+"?v="+Date.now();
    document.getElementById("appleIcon").href=iconURL;
    document.getElementById("downloadIcon").href=iconURL;
}

// Show download link only when tapping workdays
document.getElementById("workdaysNumber").addEventListener("click",()=>{
    document.getElementById("downloadIcon").style.display="inline-block";
});
</script>
</body>
</html>
