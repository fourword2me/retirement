<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jon Frazer Dashboard</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}
.container {
    width: 95%;
    max-width: 1000px;
    height: 95vh;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    text-align: center;
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    padding: 20px;
    box-sizing: border-box;
}
h1 {
    font-size: 2.5rem;
    margin: 0;
}
.section {
    margin: 10px 0;
}
.countdown {
    font-size: 1.8rem;
}
.workdays {
    font-size: 4rem;
    font-weight: bold;
    color: #00ff87;
    text-shadow: 0 0 20px rgba(0,255,135,0.7);
}
.label {
    font-size: 1.2rem;
    opacity: 0.8;
}
.progress-container {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    height: 25px;
    overflow: hidden;
    width: 100%;
    max-width: 600px;
    margin-top: 10px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    transition: width 1s ease;
}
.progress-text {
    margin-top: 8px;
    font-size: 1.1rem;
}
.vacation {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 15px;
}
.vacation-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 120px;
    height: 120px; /* fixed height for consistent layout */
}
.vacation-item img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* auto-crop and fill box without distortion */
    border-radius: 10px;
    margin-bottom: 5px;
    transition: transform 0.3s, box-shadow 0.3s;
}
.vacation-item img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
}
.vacation-item .caption {
    font-size: 0.9rem;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">
    <h1>Jon Frazer's Retirement Dashboard 🚀</h1>

    <div class="section">
        <div id="countdown" class="countdown"></div>
    </div>

    <div class="section">
        <div id="workdays" class="workdays"></div>
        <div class="label">Workdays Remaining</div>
    </div>

    <div class="section">
        <div class="label">Career Progress</div>
        <div class="progress-container">
            <div id="careerBar" class="progress-bar"></div>
        </div>
        <div id="careerText" class="progress-text"></div>
    </div>

    <div class="section">
        <div id="vacationCountdown" class="countdown"></div>
        <div class="label">Scotland Vacation: May 9–25, 2026</div>
        <div class="vacation">
            <div class="vacation-item">
                <img src="images/canalboat.jpg" alt="Canal Boat">
                <div class="caption">Canal Boat</div>
            </div>
            <div class="vacation-item">
                <img src="images/kelpies.jpg" alt="The Kelpies">
                <div class="caption">The Kelpies</div>
            </div>
            <div class="vacation-item">
                <img src="images/edinburgh_castle.jpg" alt="Edinburgh Castle">
                <div class="caption">Edinburgh Castle</div>
            </div>
        </div>
    </div>

</div>

<script>
const retirementDate = new Date("May 15, 2026 00:00:00");
const careerStart = new Date("January 1, 1990 00:00:00");
const vacationStart = new Date("May 9, 2026 00:00:00");
const vacationEnd = new Date("May 25, 2026 23:59:59");

function getWorkdaysRemaining(start, end) {
    let count = 0;
    let current = new Date(start);
    while (current <= end) {
        const day = current.getDay();
        if(day !== 0 && day !== 6) count++;
        current.setDate(current.getDate() +1);
    }
    return count;
}

function formatCountdown(target) {
    const now = new Date();
    const distance = target - now;
    if(distance <= 0) return "Event Started!";
    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);
    return `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

function update() {
    const now = new Date();
    
    // Retirement countdown
    const distanceRetire = retirementDate - now;
    document.getElementById("countdown").textContent =
        distanceRetire > 0 ?
        `${formatCountdown(retirementDate)} until Retirement (May 15, 2026)` :
        "YOU'RE RETIRED 🎉";

    // Workdays remaining
    const workdays = getWorkdaysRemaining(now, retirementDate);
    document.getElementById("workdays").textContent = workdays;

    // Career progress
    const totalCareer = retirementDate - careerStart;
    const completed = now - careerStart;
    const percent = Math.min((completed/totalCareer)*100,100);
    document.getElementById("careerBar").style.width = percent + "%";
    document.getElementById("careerText").textContent = percent.toFixed(2) + "% Complete";

    // Vacation countdown
    let vacationText = "";
    if(now < vacationStart) {
        vacationText = formatCountdown(vacationStart) + " until Scotland Vacation";
    } else if(now >= vacationStart && now <= vacationEnd) {
        vacationText = "Vacation Started! 🎉";
    } else {
        vacationText = "Vacation Over 😢";
    }
    document.getElementById("vacationCountdown").textContent = vacationText;
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
