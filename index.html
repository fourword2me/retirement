<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jon Frazer Dashboard</title>

<!-- iOS Home Screen Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jon Frazer Dashboard">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link id="appleIcon" rel="apple-touch-icon" href="images/apple-touch-icon.png">

<style>
/* ...keep all your previous CSS here... */
html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex; justify-content: center; align-items: center;
}
.container {
    width: 95%; max-width: 1000px; height: 95vh;
    display: flex; flex-direction: column; justify-content: space-evenly;
    align-items: center; text-align: center;
    background: rgba(0,0,0,0.6); border-radius: 20px;
    padding: 20px; box-sizing: border-box;
}
/* Add your previous CSS for headings, sections, countdown, workdays, progress bar, vacation images, lightbox etc. */
/* Include #generateIconBtn styles as before */
</style>
</head>
<body>

<div class="container">
    <h1>Jon Frazer's Retirement Dashboard 🚀</h1>
    <div class="section"><div id="countdown" class="countdown"></div></div>
    <div class="section"><div id="workdays" class="workdays"></div><div class="label">Workdays Remaining</div></div>
    <div class="section">
        <div class="label">Career Progress</div>
        <div class="progress-container"><div id="careerBar" class="progress-bar"></div></div>
        <div id="careerText" class="progress-text"></div>
    </div>
    <div class="section">
        <div id="vacationCountdown" class="countdown"></div>
        <div class="label">Scotland Vacation: May 9–25, 2026</div>
        <div class="vacation">
            <div class="vacation-item"><img src="images/canalboat.jpg" alt="Canal Boat"><div class="caption">Canal Boat</div></div>
            <div class="vacation-item"><img src="images/kelpies.jpg" alt="The Kelpies"><div class="caption">The Kelpies</div></div>
            <div class="vacation-item"><img src="images/edinburgh_castle.jpg" alt="Edinburgh Castle"><div class="caption">Edinburgh Castle</div></div>
        </div>
    </div>
    <button id="generateIconBtn">Generate Home Screen Icon</button>
</div>

<!-- Lightbox HTML -->
<div id="lightbox" class="lightbox">
  <span class="lightbox-close">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
</div>

<script>
// Dashboard countdown functions
const retirementDate = new Date("May 15, 2026 00:00:00");
const careerStart = new Date("January 1, 1990 00:00:00");
const vacationStart = new Date("May 9, 2026 00:00:00");
const vacationEnd = new Date("May 25, 2026 23:59:59");

function getWorkdaysRemaining(start, end) {
    let count = 0, current = new Date(start);
    while(current <= end){ const day = current.getDay(); if(day!==0 && day!==6) count++; current.setDate(current.getDate()+1);}
    return count;
}

function formatCountdown(target){
    const now = new Date();
    const distance = target - now;
    if(distance <=0) return "Event Started!";
    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);
    return `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

function updateDashboard(){
    const now = new Date();
    // Retirement
    document.getElementById("countdown").textContent = retirementDate-now>0 ? formatCountdown(retirementDate)+" until Retirement (May 15, 2026)" : "YOU'RE RETIRED 🎉";
    // Workdays
    const workdays = getWorkdaysRemaining(now, retirementDate);
    document.getElementById("workdays").textContent = workdays;
    // Career progress
    const percent = Math.min((now-careerStart)/(retirementDate-careerStart)*100,100);
    document.getElementById("careerBar").style.width = percent+"%";
    document.getElementById("careerText").textContent = percent.toFixed(2)+"% Complete";
    // Vacation
    let vacText="";
    if(now<vacationStart) vacText = formatCountdown(vacationStart)+" until Scotland Vacation";
    else if(now<=vacationEnd) vacText="Vacation Started! 🎉";
    else vacText="Vacation Over 😢";
    document.getElementById("vacationCountdown").textContent = vacText;

    // Generate icon automatically each time dashboard loads
    generateIcon(workdays);
}

updateDashboard();
setInterval(updateDashboard,1000);

// Lightbox
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.getElementsByClassName("lightbox-close")[0];
document.querySelectorAll(".vacation-item img").forEach(img=>{
    img.addEventListener("click",()=>{lightbox.style.display="block"; lightboxImg.src=img.src; lightboxImg.alt=img.alt;});
});
closeBtn.onclick = ()=>{lightbox.style.display="none";}
lightbox.onclick = e=>{if(e.target===lightbox) lightbox.style.display="none";}

// Icon generator function
function generateIcon(workdays){
    const canvas=document.createElement('canvas');
    canvas.width=180; canvas.height=180;
    const ctx=canvas.getContext('2d');
    // Background
    ctx.fillStyle='#203a43'; ctx.fillRect(0,0,180,180);
    ctx.beginPath(); ctx.arc(90,90,80,0,2*Math.PI); ctx.fillStyle='#00000080'; ctx.fill();
    // Number
    ctx.fillStyle='#00ff87'; ctx.font='bold 60px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(workdays,90,90);
    // Label
    ctx.font='bold 18px sans-serif'; ctx.fillText('Workdays',90,135);
    // Convert to PNG and attach as home screen icon (with cache-buster)
    const link=document.getElementById('appleIcon');
    link.href=canvas.toDataURL('image/png')+"?v="+Date.now(); // cache-busting
}

// Manual button
document.getElementById('generateIconBtn').addEventListener('click', ()=>{
    const workdays=document.getElementById('workdays').textContent;
    generateIcon(workdays);
});
</script>
</body>
</html>
